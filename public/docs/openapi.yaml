openapi: 3.0.3
info:
  title: 'ClearGate FX API Documentation'
  description: 'API documentation for the ClearGate FX currency exchange backend.'
  version: 1.0.0
servers:
  -
    url: 'http://exhange.test'
tags:
  -
    name: Authentication
    description: "\nEndpoints for API token login, logout, profile lookup, and password changes."
  -
    name: Customers
    description: "\nManage customers owned by users and linked to their vaults."
  -
    name: Endpoints
    description: ''
  -
    name: Transactions
    description: "\nManage receive/send transactions. Financial calculations are handled by TransactionService."
  -
    name: Vaults
    description: "\nView and manage user vault information. Balance changes remain service-driven."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Use the token returned by POST /api/v1/auth/login as a Bearer token.'
security:
  -
    default: []
paths:
  /api/v1/auth/login:
    post:
      summary: Login
      operationId: login
      description: 'Authenticate an active user and return a Sanctum bearer token.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تم تسجيل الدخول'
                  data:
                    user:
                      id: 1
                      name: Owner
                      email: owner@example.com
                    token: 1|example-token
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم تسجيل الدخول'
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: Owner
                          email:
                            type: string
                            example: owner@example.com
                      token:
                        type: string
                        example: 1|example-token
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'بيانات الدخول غير صحيحة'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'بيانات الدخول غير صحيحة'
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'الحساب موقوف'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'الحساب موقوف'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
                password:
                  type: string
                  description: ''
                  example: '|]|{+-'
              required:
                - email
                - password
      security: []
  /api/v1/auth/logout:
    post:
      summary: Logout
      operationId: logout
      description: 'Revoke the current Sanctum token for the authenticated user.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تم تسجيل الخروج'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم تسجيل الخروج'
      tags:
        - Authentication
  /api/v1/auth/me:
    get:
      summary: 'Current user'
      operationId: currentUser
      description: 'Return the authenticated user profile.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: Success
                  data:
                    id: 1
                    name: Owner
                    email: owner@example.com
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Success
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: Owner
                      email:
                        type: string
                        example: owner@example.com
      tags:
        - Authentication
  /api/v1/auth/change-password:
    put:
      summary: 'Change password'
      operationId: changePassword
      description: "Update the authenticated user's password after verifying the current password."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تم تغيير كلمة المرور'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم تغيير كلمة المرور'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'كلمة المرور الحالية غير صحيحة'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'كلمة المرور الحالية غير صحيحة'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                  description: ''
                  example: architecto
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: ']|{+-0pBNvYg'
              required:
                - current_password
                - password
  '/api/v1/customers/{customer_id}/transactions':
    get:
      summary: 'Customer transactions'
      operationId: customerTransactions
      description: 'List transactions linked to a customer.'
      parameters:
        -
          in: query
          name: per_page
          description: 'Results per page.'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Results per page.'
            example: 20
      responses: {  }
      tags:
        - Customers
    parameters:
      -
        in: path
        name: customer_id
        description: 'The ID of the customer.'
        example: 16
        required: true
        schema:
          type: integer
  '/api/v1/customers/{customer_id}/balance':
    get:
      summary: 'Customer balance'
      operationId: customerBalance
      description: 'Return the customer balance in USD.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: Success
                  data:
                    balance_usd: 250.5
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Success
                  data:
                    type: object
                    properties:
                      balance_usd:
                        type: number
                        example: 250.5
      tags:
        - Customers
    parameters:
      -
        in: path
        name: customer_id
        description: 'The ID of the customer.'
        example: 16
        required: true
        schema:
          type: integer
  /api/v1/customers:
    get:
      summary: 'List customers'
      operationId: listCustomers
      description: 'Owner users can see all customers. Managers are scoped to their own customers.'
      parameters:
        -
          in: query
          name: search
          description: 'Search by customer name.'
          example: Ahmed
          required: false
          schema:
            type: string
            description: 'Search by customer name.'
            example: Ahmed
        -
          in: query
          name: category
          description: 'Filter by category.'
          example: regular
          required: false
          schema:
            type: string
            description: 'Filter by category.'
            example: regular
        -
          in: query
          name: user_id
          description: 'Owner-only user filter.'
          example: 3
          required: false
          schema:
            type: integer
            description: 'Owner-only user filter.'
            example: 3
        -
          in: query
          name: is_active
          description: 'Filter active status.'
          example: true
          required: false
          schema:
            type: boolean
            description: 'Filter active status.'
            example: true
        -
          in: query
          name: with_trashed
          description: 'Include soft-deleted rows.'
          example: false
          required: false
          schema:
            type: boolean
            description: 'Include soft-deleted rows.'
            example: false
        -
          in: query
          name: per_page
          description: 'Results per page.'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Results per page.'
            example: 20
      responses: {  }
      tags:
        - Customers
    post:
      summary: 'Create customer'
      operationId: createCustomer
      description: "Create a customer and attach it to the selected user's vault."
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تم إنشاء العميل'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم إنشاء العميل'
      tags:
        - Customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: b
                phone:
                  type: string
                  description: 'Must not be greater than 30 characters.'
                  example: 'n'
                  nullable: true
                note:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
                category:
                  type: string
                  description: ''
                  example: agent
                  enum:
                    - regular
                    - vip
                    - agent
                    - company
                  nullable: true
                country:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: 'n'
                  nullable: true
                user_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example: 16
                  nullable: true
              required:
                - name
  '/api/v1/customers/{id}':
    get:
      summary: 'Show customer'
      operationId: showCustomer
      description: 'Return one customer if the current user is allowed to view it.'
      parameters: []
      responses: {  }
      tags:
        - Customers
    put:
      summary: 'Update customer'
      operationId: updateCustomer
      description: 'Update customer profile fields.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تم تحديث العميل'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم تحديث العميل'
      tags:
        - Customers
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: b
                phone:
                  type: string
                  description: 'Must not be greater than 30 characters.'
                  example: 'n'
                  nullable: true
                note:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
                category:
                  type: string
                  description: ''
                  example: agent
                  enum:
                    - regular
                    - vip
                    - agent
                    - company
                  nullable: true
                country:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: 'n'
                  nullable: true
                is_active:
                  type: boolean
                  description: ''
                  example: true
                  nullable: true
    delete:
      summary: 'Delete customer'
      operationId: deleteCustomer
      description: 'Soft-delete a customer.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تم حذف العميل'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم حذف العميل'
      tags:
        - Customers
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the customer.'
        example: 16
        required: true
        schema:
          type: integer
  '/api/v1/customers/{id}/restore':
    patch:
      summary: 'Restore customer'
      operationId: restoreCustomer
      description: 'Owner-only endpoint that restores a soft-deleted customer.'
      parameters: []
      responses: {  }
      tags:
