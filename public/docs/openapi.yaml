openapi: 3.0.3
info:
  title: 'ClearGate FX API Documentation'
  description: 'API documentation for the ClearGate FX currency exchange backend.'
  version: 1.0.0
servers:
  -
    url: 'http://127.0.0.1:8000'
tags:
  -
    name: Archive
    description: "\nBrowse archived records and restore them through owner-only restore actions."
  -
    name: Auth
    description: "\nEndpoints for API token login, logout, profile lookup, and password changes."
  -
    name: Boxes
    description: "\nManage operational boxes and their balance adjustment audit logs."
  -
    name: Currencies
    description: "\nManage supported currencies and their current USD exchange rates."
  -
    name: Customers
    description: "\nManage customers owned by users and linked to their vaults."
  -
    name: Dashboard
    description: "\nOperational summaries and charts for the authenticated user's permitted scope."
  -
    name: 'Exchange Rates'
    description: "\nView exchange-rate history and update current currency rates."
  -
    name: Notifications
    description: "\nRead and manage in-app notifications for the authenticated user."
  -
    name: Operations
    description: "\nManage complete money transfer operations beside the legacy transaction system."
  -
    name: Permissions
    description: "\nOwner-only permission lookup with Arabic display labels."
  -
    name: Receipts
    description: "\nGenerate transaction receipt PDFs."
  -
    name: Reports
    description: "\nGenerate JSON reports and queue report exports."
  -
    name: Roles
    description: "\nOwner-only role and role-permission management."
  -
    name: Settings
    description: "\nRead and manage application settings grouped by feature area."
  -
    name: Transactions
    description: "\nManage receive/send transactions. Financial calculations are handled by TransactionService."
  -
    name: Users
    description: "\nOwner-only user management endpoints."
  -
    name: Vaults
    description: "\nView and manage user vault information. Balance changes remain service-driven."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Use the token returned by POST /api/v1/auth/login as a Bearer token.'
security:
  -
    default: []
paths:
  /api/v1/archive:
    get:
      summary: 'List archive entries'
      operationId: listArchiveEntries
      description: 'Owners can see all archive entries. Managers are scoped to entries they archived.'
      parameters:
        -
          in: query
          name: type
          description: 'Filter by archived type.'
          example: transaction
          required: false
          schema:
            type: string
            description: 'Filter by archived type.'
            example: transaction
        -
          in: query
          name: date_from
          description: 'date Filter from archive date.'
          example: '2026-05-01'
          required: false
          schema:
            type: string
            description: 'date Filter from archive date.'
            example: '2026-05-01'
        -
          in: query
          name: date_to
          description: 'date Filter to archive date.'
          example: '2026-05-31'
          required: false
          schema:
            type: string
            description: 'date Filter to archive date.'
            example: '2026-05-31'
        -
          in: query
          name: per_page
          description: 'Results per page.'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Results per page.'
            example: 20
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: Success
                  data:
                    -
                      id: 1
                      archivable_type: transaction
                      archivable_id: 10
                      reason: transaction.deleted
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Success
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        archivable_type: transaction
                        archivable_id: 10
                        reason: transaction.deleted
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        archivable_type:
                          type: string
                          example: transaction
                        archivable_id:
                          type: integer
                          example: 10
                        reason:
                          type: string
                          example: transaction.deleted
      tags:
        - Archive
  '/api/v1/archive/{id}':
    get:
      summary: 'Show archive entry'
      operationId: showArchiveEntry
      description: 'Return one archive entry if the current user is allowed to view it.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: Success
                  data:
                    id: 1
                    archivable_type: transaction
                    archivable_id: 10
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Success
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      archivable_type:
                        type: string
                        example: transaction
                      archivable_id:
                        type: integer
                        example: 10
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'غير مصرح'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'غير مصرح'
      tags:
        - Archive
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the archive.'
        example: 16
        required: true
        schema:
          type: integer
  '/api/v1/archive/{archive_id}/restore':
    post:
      summary: 'Restore archive entry'
      operationId: restoreArchiveEntry
      description: 'Owner-only endpoint that restores the archived model.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تمت الاستعادة من الأرشيف'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تمت الاستعادة من الأرشيف'
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'غير مصرح'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'غير مصرح'
      tags:
        - Archive
    parameters:
      -
        in: path
        name: archive_id
        description: 'The ID of the archive.'
        example: 16
        required: true
        schema:
          type: integer
  /api/v1/auth/login:
    post:
      summary: Login
      operationId: login
      description: 'Authenticate an active user and return a Sanctum bearer token.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تم تسجيل الدخول'
                  data:
                    user:
                      id: 1
                      name: Owner
                      email: owner@example.com
                      roles:
                        -
                          name: owner
                          label: مالك
                      permissions:
                        -
                          name: transaction.viewAny
                          label: 'عرض كل العمليات المالية'
                          group: transactions
                          group_label: 'العمليات المالية'
                    token: 1|example-token
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم تسجيل الدخول'
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: Owner
                          email:
                            type: string
                            example: owner@example.com
                          roles:
                            type: array
                            example:
                              -
                                name: owner
                                label: مالك
                            items:
                              type: object
                              properties:
                                name:
                                  type: string
                                  example: owner
                                label:
                                  type: string
                                  example: مالك
                          permissions:
                            type: array
                            example:
                              -
                                name: transaction.viewAny
                                label: 'عرض كل العمليات المالية'
                                group: transactions
                                group_label: 'العمليات المالية'
                            items:
                              type: object
                              properties:
                                name:
                                  type: string
                                  example: transaction.viewAny
                                label:
                                  type: string
                                  example: 'عرض كل العمليات المالية'
                                group:
                                  type: string
                                  example: transactions
                                group_label:
                                  type: string
                                  example: 'العمليات المالية'
                      token:
                        type: string
                        example: 1|example-token
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'بيانات الدخول غير صحيحة'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'بيانات الدخول غير صحيحة'
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'الحساب موقوف'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'الحساب موقوف'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
                password:
                  type: string
                  description: ''
                  example: '|]|{+-'
              required:
                - email
                - password
      security: []
  /api/v1/auth/logout:
    post:
      summary: Logout
      operationId: logout
      description: 'Revoke the current Sanctum token for the authenticated user.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تم تسجيل الخروج'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم تسجيل الخروج'
      tags:
        - Auth
  /api/v1/auth/me:
    get:
      summary: 'Current user'
      operationId: currentUser
      description: 'Return the authenticated user profile.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: Success
                  data:
                    id: 1
                    name: Owner
                    email: owner@example.com
                    roles:
                      -
                        name: owner
                        label: مالك
                    permissions:
                      -
                        name: transaction.viewAny
                        label: 'عرض كل العمليات المالية'
                        group: transactions
                        group_label: 'العمليات المالية'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Success
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: Owner
                      email:
                        type: string
                        example: owner@example.com
                      roles:
                        type: array
                        example:
                          -
                            name: owner
                            label: مالك
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              example: owner
                            label:
                              type: string
                              example: مالك
                      permissions:
                        type: array
                        example:
                          -
                            name: transaction.viewAny
                            label: 'عرض كل العمليات المالية'
                            group: transactions
                            group_label: 'العمليات المالية'
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              example: transaction.viewAny
                            label:
                              type: string
                              example: 'عرض كل العمليات المالية'
                            group:
                              type: string
                              example: transactions
                            group_label:
                              type: string
                              example: 'العمليات المالية'
      tags:
        - Auth
  /api/v1/auth/change-password:
    put:
      summary: 'Change password'
      operationId: changePassword
      description: "Update the authenticated user's password after verifying the current password."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تم تغيير كلمة المرور'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم تغيير كلمة المرور'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'كلمة المرور الحالية غير صحيحة'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'كلمة المرور الحالية غير صحيحة'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                  description: ''
                  example: architecto
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: ']|{+-0pBNvYg'
              required:
                - current_password
                - password
  '/api/v1/boxes/{box_id}/balance':
    patch:
      summary: 'Adjust box balance'
      operationId: adjustBoxBalance
      description: 'Adjust the current balance and save a full audit log entry.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تم تحديث رصيد الصندوق'
                  data:
                    id: 1
                    current_balance: '1250.0000'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم تحديث رصيد الصندوق'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      current_balance:
                        type: string
                        example: '1250.0000'
      tags:
        - Boxes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operation_type:
                  type: string
                  description: ''
                  example: subtract
                  enum:
                    - add
                    - subtract
                amount:
                  type: number
                  description: ''
                  example: 4326.41688
                notes:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
              required:
                - operation_type
                - amount
    parameters:
      -
        in: path
        name: box_id
        description: 'The ID of the box.'
        example: 16
        required: true
        schema:
          type: integer
  '/api/v1/boxes/{box_id}/logs':
    get:
      summary: 'Box balance logs'
      operationId: boxBalanceLogs
      description: 'Return the balance adjustment audit trail for one box.'
      parameters:
        -
          in: query
          name: per_page
          description: 'Results per page.'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Results per page.'
            example: 20
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: Success
                  data:
                    -
                      operation_type: add
                      amount: '250.0000'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Success
                  data:
                    type: array
                    example:
                      -
                        operation_type: add
                        amount: '250.0000'
                    items:
                      type: object
                      properties:
                        operation_type:
                          type: string
                          example: add
                        amount:
                          type: string
                          example: '250.0000'
      tags:
        - Boxes
    parameters:
      -
        in: path
        name: box_id
        description: 'The ID of the box.'
        example: 16
        required: true
        schema:
          type: integer
  /api/v1/boxes:
    get:
      summary: 'List boxes'
      operationId: listBoxes
      description: 'Owners can see all boxes. Managers need box.viewAny. Operations employees only see assigned boxes.'
      parameters:
        -
          in: query
          name: type
          description: 'Filter by box type.'
          example: turkish
          required: false
          schema:
            type: string
            description: 'Filter by box type.'
            example: turkish
        -
          in: query
          name: per_page
          description: 'Results per page.'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Results per page.'
            example: 20
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: Success
                  data:
                    -
                      id: 1
                      name: 'Turkish Main'
                      type: turkish
                      current_balance: '1000.0000'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Success
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        name: 'Turkish Main'
                        type: turkish
                        current_balance: '1000.0000'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: 'Turkish Main'
                        type:
                          type: string
                          example: turkish
                        current_balance:
                          type: string
                          example: '1000.0000'
      tags:
        - Boxes
    post:
      summary: 'Create box'
      operationId: createBox
      description: 'Owner users and managers with box.create can create boxes.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تم إنشاء الصندوق'
                  data:
                    id: 1
                    name: 'Turkish Main'
                    type: turkish
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم إنشاء الصندوق'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Turkish Main'
                      type:
                        type: string
                        example: turkish
      tags:
        - Boxes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: b
                type:
                  type: string
                  description: ''
                  example: usdt_wallet
                  enum:
                    - turkish
                    - local_bank_wallet
                    - usdt_wallet
                current_balance:
                  type: number
                  description: 'Must be at least 0.'
                  example: 39
                  nullable: true
                currency:
                  type: string
                  description: 'Must not be greater than 10 characters.'
                  example: gzmiyv
                assigned_user_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example: 16
                  nullable: true
                status:
                  type: string
                  description: 'Must not be greater than 30 characters.'
                  example: 'n'
                  enum:
                    - active
                    - inactive
                  nullable: true
                notes:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
              required:
                - name
                - type
                - currency
  '/api/v1/boxes/{id}':
    get:
      summary: 'Show box'
      operationId: showBox
      description: 'Return one box if the current user can access it.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: Success
                  data:
                    id: 1
                    name: 'Turkish Main'
                    type: turkish
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Success
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Turkish Main'
                      type:
                        type: string
                        example: turkish
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'غير مصرح'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'غير مصرح'
      tags:
        - Boxes
    put:
      summary: 'Update box'
      operationId: updateBox
      description: 'Update editable box metadata. Balance changes must use the balance endpoint.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تم تحديث الصندوق'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم تحديث الصندوق'
      tags:
        - Boxes
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: b
                  nullable: true
                type:
                  type: string
                  description: ''
                  example: local_bank_wallet
                  enum:
                    - turkish
                    - local_bank_wallet
                    - usdt_wallet
                  nullable: true
                currency:
                  type: string
                  description: 'Must not be greater than 10 characters.'
                  example: ngzmiy
                  nullable: true
                assigned_user_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example: 16
                  nullable: true
                status:
                  type: string
                  description: 'Must not be greater than 30 characters.'
                  example: 'n'
                  enum:
                    - active
                    - inactive
                  nullable: true
                notes:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
    delete:
      summary: 'Delete box'
      operationId: deleteBox
      description: 'Delete a box and its balance logs.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'تم حذف الصندوق'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'تم حذف الصندوق'
      tags:
        - Boxes
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the box.'
        example: 16
        required: true
        schema:
          type: integer
  /api/v1/currencies:
    get:
      summary: 'List currencies'
      operationId: listCurrencies
      description: 'Return paginated currencies with optional search and active status filters.'
      parameters:
        -
          in: query
          name: search
          description: 'Search by code, English name, or Arabic name.'
          example: USD
          required: false
          schema:
            type: string
            description: 'Search by code, English name, or Arabic name.'
            example: USD
        -
          in: query
          name: is_active
          description: 'Filter by active status.'
          example: true
          required: false
          schema:
            type: boolean
            description: 'Filter by active status.'
            example: true
        -
          in: query
          name: per_page
          description: 'Results per page.'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Results per page.'
            example: 20
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: Success
                  data:
                    -
                      id: 1
                      code: USD
                      name: 'US Dollar'
                      name_ar: 'دولار أمريكي'
                      symbol: $
                      rate_to_usd: '1.000000'
                      is_active: true
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Success
                  data:
                    type: array
                    example:
