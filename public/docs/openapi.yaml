      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rate:
                  type: number
                  description: ''
                  example: 4326.41688
                date:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-05-02T21:28:52'
                  nullable: true
              required:
